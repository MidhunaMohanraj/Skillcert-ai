<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillCert AI — Clinical Skills Verification Platform</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
    body { margin: 0; background: #f8fafc; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes scanAnim { 0% { top: 0; } 100% { top: calc(100% - 3px); } }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }
    @keyframes progressBar { from { width: 0; } to { width: var(--target-width, 60%); } }
    @keyframes countUp { from { opacity: 0; } to { opacity: 1; } }
    @keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }
    @keyframes borderPulse { 0%, 100% { border-color: #3b82f6; } 50% { border-color: #6366f1; } }
    .a1 { animation: fadeInUp 0.5s 0.05s ease both; }
    .a2 { animation: fadeInUp 0.5s 0.12s ease both; }
    .a3 { animation: fadeInUp 0.5s 0.19s ease both; }
    .a4 { animation: fadeInUp 0.5s 0.26s ease both; }
    .a5 { animation: fadeInUp 0.5s 0.33s ease both; }
    .a6 { animation: fadeInUp 0.5s 0.40s ease both; }
    .a7 { animation: fadeInUp 0.5s 0.47s ease both; }
    .a8 { animation: fadeInUp 0.5s 0.54s ease both; }
    .fade-in { animation: fadeIn 0.4s ease both; }
    .spin { animation: spin 1s linear infinite; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .hover-lift { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .hover-lift:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(0,0,0,0.12); }
    .gradient-text { background: linear-gradient(135deg, #3b82f6, #06b6d4, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .hero-bg { background: linear-gradient(135deg, #020617 0%, #0f172a 30%, #1e1b4b 60%, #0c1a3a 100%); }
    .card-shine { background: linear-gradient(135deg, #1e40af 0%, #0d9488 100%); }
    .glass-card { background: rgba(255,255,255,0.07); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.15); }
    .scan-line { position: absolute; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, #06b6d4, transparent); animation: scanAnim 2s linear infinite; }
    .progress-animated { animation: progressBar 1.2s 0.5s ease both; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .step-connector::after { content: ''; position: absolute; top: 50%; right: -28px; width: 28px; height: 2px; background: linear-gradient(90deg, #3b82f6, #06b6d4); transform: translateY(-50%); }
    .module-locked { filter: grayscale(0.4); }
    .timestamp-pill { display: inline-flex; align-items: center; gap: 4px; background: #fef3c7; border: 1px solid #f59e0b; color: #92400e; border-radius: 999px; padding: 2px 10px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
    .timestamp-pill:hover { background: #f59e0b; color: white; }
    .timestamp-pill.fail-pill { background: #fee2e2; border-color: #ef4444; color: #991b1b; }
    .timestamp-pill.fail-pill:hover { background: #ef4444; color: white; }
    .nav-pill { padding: 6px 14px; border-radius: 999px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: none; white-space: nowrap; }
    .nav-pill.active { background: #3b82f6; color: white; }
    .nav-pill:not(.active) { background: transparent; color: #64748b; }
    .nav-pill:not(.active):hover { background: #f1f5f9; color: #1e293b; }
    .criterion-card { border-left: 4px solid transparent; transition: all 0.2s; }
    .criterion-card.pass { border-left-color: #10b981; }
    .criterion-card.partial { border-left-color: #f59e0b; }
    .criterion-card.fail { border-left-color: #ef4444; }
    .upload-zone { border: 2px dashed #94a3b8; border-radius: 16px; transition: all 0.2s; cursor: pointer; }
    .upload-zone:hover, .upload-zone.drag-over { border-color: #3b82f6; background: #eff6ff; }
    .processing-step { transition: all 0.4s; }
    .processing-step.done { opacity: 1; }
    .processing-step.active { opacity: 1; animation: pulse 1.5s ease-in-out infinite; }
    .processing-step.pending { opacity: 0.35; }
    table { border-collapse: collapse; }
  </style>
</head>

/* ─── SMALL HELPERS ──────────────────────────────────────────────────── */
const StatusBadge = ({ status, size='sm' }) => {
  const map = {
    'pass': ['bg-emerald-100 text-emerald-700 border border-emerald-200', '✓ Pass'],
    'partial': ['bg-amber-100 text-amber-700 border border-amber-200', '⚠ Partial'],
    'fail': ['bg-red-100 text-red-700 border border-red-200', '✗ Fail'],
    'Passed': ['bg-emerald-100 text-emerald-700 border border-emerald-200', '✓ Passed'],
    'Failed': ['bg-red-100 text-red-700 border border-red-200', '✗ Failed'],
    'In Progress': ['bg-blue-100 text-blue-700 border border-blue-200', '▷ In Progress'],
    'Locked': ['bg-gray-100 text-gray-500 border border-gray-200', '🔒 Locked'],
  };
  const [cls, label] = map[status] || ['bg-gray-100 text-gray-600', status];
  const p = size === 'sm' ? 'px-2.5 py-0.5 text-xs' : 'px-3 py-1 text-sm';
  return <span className={`inline-flex items-center gap-1 font-medium rounded-full ${p} ${cls}`}>{label}</span>;
};

const ScoreRing = ({ score, size=120 }) => {
  const r = 46; const c = 2 * Math.PI * r;
  const off = c - (score / 100) * c;
  const color = score >= 80 ? '#10b981' : score >= 60 ? '#f59e0b' : '#ef4444';
  return (
    <div style={{width:size,height:size,position:'relative',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)',position:'absolute'}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#e2e8f0" strokeWidth="8"/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="8"
          strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round"
          style={{transition:'stroke-dashoffset 1.5s ease'}}/>
      </svg>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:size*0.22,fontWeight:800,color}}>{score}%</div>
        <div style={{fontSize:size*0.1,color:'#94a3b8',fontWeight:500,marginTop:2}}>SCORE</div>
      </div>
    </div>
  );
};

/* ─── DEMO NAVIGATOR ─────────────────────────────────────────────────── */
const DemoNav = ({ screen, setScreen }) => {
  const [open, setOpen] = useState(true);

const ProcessingPage = ({ setScreen }) => {
  const [step, setStep] = useState(0);
  const [elapsed, setElapsed] = useState(0);
  const steps = [
    { icon:'☁️', label:'Uploading to secure storage', detail:'Butterbase S3-compatible object store', duration:2000 },
    { icon:'🎬', label:'Extracting video frames', detail:'Sampling at 10fps for analysis', duration:2500 },

    { icon:'📊', label:'Generating timestamped report', detail:'Identifying failure moments', duration:1500 },
  ];
  useEffect(()=>{
    let total = 0;
    const timers = steps.map((s,i)=>{
      total += s.duration;
      return setTimeout(()=>setStep(i+1), total);
    });
    const done = setTimeout(()=>setScreen('feedback'), total+600);
    const tick = setInterval(()=>setElapsed(e=>e+1), 1000);
    return ()=>{ timers.forEach(clearTimeout); clearTimeout(done); clearInterval(tick); };
  }, []);
  const totalMs = steps.reduce((a,s)=>a+s.duration,0);
  const progress = Math.min(step/steps.length*100, 100);
  return (
    <div style={{minHeight:'calc(100vh - 64px)',background:'linear-gradient(135deg,#f8fafc,#eff6ff)',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{width:'100%',maxWidth:520,textAlign:'center'}}>

          <div className="pulse-anim" style={{position:'absolute',inset:0,borderRadius:'50%',background:'rgba(59,130,246,0.1)',border:'2px solid rgba(59,130,246,0.2)'}}/>
          <div style={{position:'absolute',inset:8,borderRadius:'50%',background:'rgba(59,130,246,0.08)',border:'2px solid rgba(59,130,246,0.15)'}}/>
          <div style={{position:'absolute',inset:0,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <div style={{fontSize:42}}>🧠</div>
          </div>
          {/* Orbiting dots */}
          {[0,72,144,216,288].map((deg,i)=>(
            <div key={i} style={{position:'absolute',top:'50%',left:'50%',width:8,height:8,borderRadius:'50%',background:['#3b82f6','#06b6d4','#8b5cf6','#10b981','#f59e0b'][i],transform:`rotate(${deg}deg) translateX(52px) translateY(-50%)`,transformOrigin:'0 50%',animation:`spin ${2+i*0.3}s linear infinite`}}/>
          ))}
        </div>

        <h2 style={{fontSize:26,fontWeight:900,color:'#0f172a',letterSpacing:'-0.5px',margin:'0 0 10px'}}>Analyzing Your Technique</h2>
        <p style={{color:'#64748b',fontSize:15,margin:'0 0 32px'}}>Claude Vision is scoring each criterion frame-by-frame on Cumulus Labs GPU infrastructure</p>

        {/* Steps */}
        <div style={{background:'white',borderRadius:20,padding:'24px',border:'1px solid #f1f5f9',marginBottom:24,textAlign:'left',boxShadow:'0 4px 24px rgba(0,0,0,0.06)'}}>
          {steps.map((s,i)=>{
            const state = i<step?'done':i===step?'active':'pending';
            return (
              <div key={i} className={`processing-step ${state}`} style={{display:'flex',gap:14,alignItems:'center',padding:'10px 0',borderBottom:i<4?'1px solid #f8fafc':'none'}}>
                <div style={{width:36,height:36,borderRadius:10,background:state==='done'?'#dcfce7':state==='active'?'#eff6ff':'#f8fafc',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0,transition:'background 0.3s'}}>
                  {state==='done'?<Ico.Check s={16} c="#10b981"/>:state==='active'?<div className="spin" style={{width:16,height:16,border:'2px solid #bfdbfe',borderTopColor:'#3b82f6',borderRadius:'50%'}}/>:<span>{s.icon}</span>}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,color:state==='pending'?'#94a3b8':'#0f172a',fontSize:14,transition:'color 0.3s'}}>{s.label}</div>

  );

            <ScoreRing score={r.score} size={100}/>
            <div style={{color:'white'}}>
              <div style={{fontSize:13,fontWeight:600,color:'#fca5a5',marginBottom:4}}>OVERALL SCORE</div>
              <div style={{fontSize:13,color:'#fecaca'}}>Need 100% to pass</div>
              <div style={{fontSize:13,color:'#fecaca'}}>All 5 criteria required</div>
            </div>
          </div>
        </div>
      </div>

      <div style={{maxWidth:900,margin:'0 auto',padding:'28px 24px'}}>
        {/* Quick action bar */}
        <div className="a1" style={{display:'flex',gap:12,marginBottom:24,flexWrap:'wrap'}}>
          <button onClick={()=>setScreen('module')} style={{background:'white',border:'1px solid #e2e8f0',color:'#374151',borderRadius:10,padding:'10px 18px',fontSize:14,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:8}}>
            <Ico.Play s={14} c="#3b82f6"/>Watch Reference at {r.referenceTimestamp}
          </button>
          <button onClick={()=>setScreen('upload')} style={{background:'linear-gradient(135deg,#3b82f6,#06b6d4)',border:'none',color:'white',borderRadius:10,padding:'10px 22px',fontSize:14,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:8}}>
            <Ico.Refresh s={14} c="white"/>Try Again
          </button>
          <div style={{flex:1}}/>
          <button style={{background:'white',border:'1px solid #e2e8f0',color:'#64748b',borderRadius:10,padding:'10px 16px',fontSize:13,cursor:'pointer'}}>
            <Ico.Download s={14} c="#94a3b8"/> Export Report
          </button>
        </div>

        {/* Summary chips */}
        <div className="a2" style={{display:'flex',gap:10,marginBottom:24,flexWrap:'wrap'}}>
          {r.criteriaResults.map(c=>(
            <div key={c.id} style={{display:'flex',gap:6,alignItems:'center',background:statusConfig[c.status].bg,border:`1px solid ${statusConfig[c.status].border}`,borderRadius:999,padding:'5px 12px',fontSize:13}}>
              {statusConfig[c.status].icon}
              <span style={{fontWeight:600,color:'#0f172a'}}>{c.name}</span>
            </div>
          ))}
        </div>

        {/* Timeline */}
        <div className="a2" style={{background:'white',borderRadius:16,padding:'20px',border:'1px solid #f1f5f9',marginBottom:20}}>
          <div style={{fontWeight:800,color:'#0f172a',fontSize:14,marginBottom:12}}>Failure timeline</div>
          <div style={{position:'relative',height:48}}>
            {/* Timeline bar */}
            <div style={{position:'absolute',top:20,left:0,right:0,height:4,background:'#f1f5f9',borderRadius:999}}/>
            <div style={{position:'absolute',top:20,left:0,width:'33%',height:4,background:'linear-gradient(90deg,#10b981,#34d399)',borderRadius:999}}/>
            {/* Failure segments */}
            {[{left:'13%',width:'8%',color:'#ef4444'},{left:'60%',width:'10%',color:'#f59e0b'},{left:'50%',width:'5%',color:'#f59e0b'},{left:'66%',width:'33%',color:'#ef4444'}].map((f,i)=>(
              <div key={i} style={{position:'absolute',top:20,left:f.left,width:f.width,height:4,background:f.color,borderRadius:999}}/>
            ))}
            {/* Timestamps */}
            {[{left:'13%',label:'0:04'},{left:'50%',label:'0:12'},{left:'60%',label:'0:18'},{left:'66%',label:'0:20'}].map((t,i)=>(
              <div key={i} style={{position:'absolute',top:28,left:t.left,transform:'translateX(-50%)',fontSize:10,color:'#94a3b8',fontWeight:500,whiteSpace:'nowrap'}}>{t.label}</div>
            ))}
            {/* Labels */}
            <div style={{position:'absolute',top:0,left:'2%',fontSize:10,color:'#94a3b8',fontWeight:500}}>0:00</div>
            <div style={{position:'absolute',top:0,right:0,fontSize:10,color:'#94a3b8',fontWeight:500}}>0:30</div>
          </div>
          <div style={{display:'flex',gap:8,marginTop:8,flexWrap:'wrap'}}>
            <span style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:11,color:'#64748b'}}><span style={{width:10,height:4,background:'#10b981',borderRadius:999,display:'inline-block'}}/>Passing</span>
            <span style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:11,color:'#64748b'}}><span style={{width:10,height:4,background:'#f59e0b',borderRadius:999,display:'inline-block'}}/>Partial</span>
            <span style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:11,color:'#64748b'}}><span style={{width:10,height:4,background:'#ef4444',borderRadius:999,display:'inline-block'}}/>Failing</span>
          </div>
        </div>

        {/* Criteria Cards */}
        <div className="a3" style={{display:'flex',flexDirection:'column',gap:14}}>
          {r.criteriaResults.map((c,i)=>{
            const sc = statusConfig[c.status];
            const isExp = expanded===c.id;
            return (
              <div key={c.id} className={`criterion-card ${c.status}`} style={{background:'white',borderRadius:16,overflow:'hidden',border:'1px solid #f1f5f9',boxShadow:isExp?'0 4px 20px rgba(0,0,0,0.06)':'none'}}>
                <div style={{padding:'18px 20px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}
                  onClick={()=>setExpanded(isExp?null:c.id)}>
                  <div style={{display:'flex',gap:14,alignItems:'center'}}>
                    {sc.icon}
                    <div>
                      <div style={{fontWeight:800,color:'#0f172a',fontSize:15}}>{c.name}</div>
                      <div style={{color:'#94a3b8',fontSize:12,marginTop:2}}>{c.weight}% weight · {c.type==='scored'?`${c.score}/100`:c.status.toUpperCase()}</div>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:10,alignItems:'center'}}>
                    {c.timestamps.map((t,ti)=>(
                      <span key={ti} className={`timestamp-pill ${c.status==='fail'?'fail-pill':''}`}>⏱ {t.start}–{t.end}</span>
                    ))}
                    <span style={{background:sc.labelBg,color:sc.labelTx,borderRadius:999,padding:'4px 12px',fontSize:12,fontWeight:700}}>{sc.label}</span>
                    <div style={{transform:isExp?'rotate(180deg)':'rotate(0deg)',transition:'transform 0.2s'}}>▾</div>
                  </div>
                </div>
                {isExp && (
                  <div style={{padding:'0 20px 18px',borderTop:'1px solid #f8fafc'}}>
                    <p style={{color:'#374151',fontSize:14,lineHeight:1.7,margin:'12px 0'}}>{c.feedback}</p>
                    {c.timestamps.length > 0 && (
                      <div style={{background:'#fef2f2',borderRadius:10,padding:'12px 14px',marginBottom:12}}>
                        <div style={{fontWeight:700,color:'#991b1b',fontSize:13,marginBottom:8}}>Failure timestamps</div>
                        {c.timestamps.map((t,ti)=>(
                          <div key={ti} style={{display:'flex',gap:10,alignItems:'center',marginBottom:ti<c.timestamps.length-1?6:0}}>
                            <span style={{background:'#fee2e2',color:'#991b1b',borderRadius:999,padding:'2px 10px',fontSize:12,fontWeight:700,whiteSpace:'nowrap'}}>⏱ {t.start} – {t.end}</span>
                            <span style={{color:'#dc2626',fontSize:13}}>{t.note}</span>
                          </div>
                        ))}
                      </div>
                    )}
                    <button onClick={()=>setScreen('module')} style={{background:'none',border:'1px solid #bfdbfe',color:'#3b82f6',borderRadius:8,padding:'7px 14px',fontSize:13,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>
                      <Ico.Play s={12} c="#3b82f6"/>Watch reference at {r.referenceTimestamp}
                    </button>
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* Bottom actions */}
        <div className="a4" style={{display:'flex',gap:14,marginTop:28,flexWrap:'wrap',justifyContent:'center'}}>
          <button onClick={()=>setScreen('module')} style={{background:'white',border:'1px solid #e2e8f0',color:'#374151',borderRadius:12,padding:'14px 28px',fontSize:15,fontWeight:700,cursor:'pointer'}}>
            ▷ Watch Reference Video
          </button>
          <button onClick={()=>setScreen('upload')} style={{background:'linear-gradient(135deg,#3b82f6,#06b6d4)',border:'none',color:'white',borderRadius:12,padding:'14px 32px',fontSize:15,fontWeight:700,cursor:'pointer',boxShadow:'0 4px 16px rgba(59,130,246,0.35)'}}>
            <Ico.Refresh s={16} c="white"/> Retry Assessment
          </button>
        </div>
      </div>
    </div>
  );
};

/* ─── INSTRUCTOR DASHBOARD ───────────────────────────────────────────── */
const InstructorDashboard = ({ setScreen }) => {
  const [search, setSearch] = useState('');
  const filtered = LEARNERS.filter(l=>l.name.toLowerCase().includes(search.toLowerCase())||l.role.toLowerCase().includes(search.toLowerCase()));
  const stats = [
    { label:'Total Learners', value:'48', sub:'+6 this week', icon:'👥', color:'#3b82f6', bg:'#eff6ff' },
    { label:'Overall Pass Rate', value:'34%', sub:'vs 31% last month', icon:'📈', color:'#10b981', bg:'#dcfce7' },
    { label:'Avg Attempts', value:'2.8', sub:'Per module completion', icon:'🔄', color:'#f59e0b', bg:'#fef3c7' },
    { label:'Pending Reviews', value:'7', sub:'Flagged for manual check', icon:'🔍', color:'#8b5cf6', bg:'#f5f3ff' },
  ];
  const modStats = [
    { name:'Adult CPR', passRate:72, attempts:94, color:'#ef4444' },
    { name:'AED Use', passRate:81, attempts:45, color:'#f59e0b' },
    { name:'Heimlich', passRate:65, attempts:22, color:'#8b5cf6' },
  ];
  const statusBg = { 'Passed':'#dcfce7', 'Failed':'#fee2e2', 'In Progress':'#dbeafe', 'Locked':'#f1f5f9' };
  const statusTx = { 'Passed':'#15803d', 'Failed':'#991b1b', 'In Progress':'#1d4ed8', 'Locked':'#94a3b8' };
  return (
    <div style={{minHeight:'calc(100vh - 64px)',background:'#f8fafc',padding:'28px 24px'}}>
      <div style={{maxWidth:1280,margin:'0 auto'}}>
        {/* Header */}
        <div className="a1" style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:28,flexWrap:'wrap',gap:12}}>
          <div>
            <h1 style={{fontSize:26,fontWeight:900,color:'#0f172a',margin:'0 0 4px',letterSpacing:'-0.5px'}}>Instructor Dashboard</h1>
            <p style={{color:'#64748b',fontSize:14,margin:0}}>St. Mary's Medical Center · Spring 2025 Cohort</p>
          </div>
          <div style={{display:'flex',gap:10}}>
            <button style={{background:'white',border:'1px solid #e2e8f0',color:'#374151',borderRadius:10,padding:'10px 18px',fontSize:13,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>
              <Ico.Download s={14} c="#64748b"/>Export CSV
            </button>
            <button style={{background:'linear-gradient(135deg,#3b82f6,#06b6d4)',border:'none',color:'white',borderRadius:10,padding:'10px 18px',fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>
              <Ico.Plus s={14} c="white"/>Add Learners
            </button>
          </div>
        </div>

        {/* Stat Cards */}
        <div className="a2" style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:16,marginBottom:24}}>
          {stats.map((s,i)=>(
            <div key={i} className="hover-lift" style={{background:'white',borderRadius:16,padding:'20px 22px',border:'1px solid #f1f5f9'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>
                <div style={{width:44,height:44,borderRadius:12,background:s.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>{s.icon}</div>
                <span style={{color:'#94a3b8',fontSize:11,fontWeight:600}}>{s.sub}</span>
              </div>
              <div style={{fontSize:30,fontWeight:900,color:s.color,letterSpacing:'-1px',lineHeight:1}}>{s.value}</div>
              <div style={{color:'#64748b',fontSize:13,marginTop:6,fontWeight:500}}>{s.label}</div>
            </div>
          ))}
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 340px',gap:20,marginBottom:20,alignItems:'start'}}>
          {/* Module Performance */}
          <div className="a3" style={{background:'white',borderRadius:16,padding:'22px',border:'1px solid #f1f5f9'}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:20}}>
              <h3 style={{fontWeight:800,color:'#0f172a',fontSize:15,margin:0}}>Module Performance</h3>
              <span style={{color:'#94a3b8',fontSize:12}}>Pass rate by module</span>
            </div>
            {modStats.map((m,i)=>(
              <div key={i} style={{marginBottom:18}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                  <div style={{display:'flex',gap:8,alignItems:'center'}}>
                    <div style={{width:10,height:10,borderRadius:3,background:m.color}}/>
                    <span style={{fontWeight:600,color:'#0f172a',fontSize:14}}>{m.name}</span>
                    <span style={{color:'#94a3b8',fontSize:12}}>· {m.attempts} attempts</span>
                  </div>
                  <span style={{fontWeight:800,color:m.color,fontSize:16}}>{m.passRate}%</span>
                </div>
                <div style={{background:'#f8fafc',borderRadius:999,height:10,overflow:'hidden'}}>
                  <div style={{width:`${m.passRate}%`,height:'100%',background:`linear-gradient(90deg,${m.color}88,${m.color})`,borderRadius:999,transition:'width 1s ease'}}/>
                </div>
              </div>
            ))}
          </div>

          {/* Criterion Heatmap */}
          <div className="a3" style={{background:'white',borderRadius:16,padding:'22px',border:'1px solid #f1f5f9'}}>
            <h3 style={{fontWeight:800,color:'#0f172a',fontSize:15,margin:'0 0 16px'}}>Hardest Criteria</h3>
            {[
              { name:'Rhythm Consistency', fail:58, mod:'CPR' },
              { name:'Compression Rate', fail:44, mod:'CPR' },
              { name:'Chest Recoil', fail:31, mod:'CPR' },
              { name:'Pad Placement', fail:29, mod:'AED' },
              { name:'Clear Call', fail:22, mod:'AED' },
            ].map((c,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,padding:'8px 12px',background:'#fafafa',borderRadius:10}}>
                <div>
                  <div style={{fontWeight:600,color:'#0f172a',fontSize:13}}>{c.name}</div>
                  <div style={{color:'#94a3b8',fontSize:11}}>{c.mod} module</div>
                </div>
                <span style={{background:c.fail>50?'#fee2e2':c.fail>30?'#fef3c7':'#f1f5f9',color:c.fail>50?'#ef4444':c.fail>30?'#d97706':'#64748b',borderRadius:999,padding:'4px 10px',fontSize:12,fontWeight:700}}>{c.fail}% fail rate</span>
              </div>
            ))}
          </div>
        </div>

        {/* Learner Table */}
        <div className="a4" style={{background:'white',borderRadius:16,border:'1px solid #f1f5f9',overflow:'hidden'}}>
          <div style={{padding:'18px 22px',borderBottom:'1px solid #f8fafc',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12}}>
            <h3 style={{fontWeight:800,color:'#0f172a',fontSize:15,margin:0}}>Learner Progress</h3>
            <div style={{display:'flex',gap:10,alignItems:'center'}}>
              <div style={{position:'relative'}}>
                <div style={{position:'absolute',top:'50%',left:10,transform:'translateY(-50%)'}}>
                  <Ico.Search s={16} c="#94a3b8"/>
                </div>
                <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search learners..." style={{paddingLeft:34,padding:'8px 12px 8px 34px',borderRadius:8,border:'1px solid #e2e8f0',fontSize:13,outline:'none',width:200}}/>
              </div>
            </div>
          </div>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead>
                <tr style={{background:'#f8fafc'}}>
                  {['Learner','Role','CPR','AED','Heimlich','Avg Score','Attempts','Last Active'].map(h=>(
                    <th key={h} style={{padding:'10px 18px',textAlign:'left',fontSize:12,fontWeight:700,color:'#64748b',letterSpacing:'0.3px',whiteSpace:'nowrap'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map((l,i)=>(
                  <tr key={i} style={{borderTop:'1px solid #f8fafc',transition:'background 0.15s',cursor:'pointer'}}
                    onMouseEnter={e=>e.currentTarget.style.background='#f8fafc'}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                    <td style={{padding:'14px 18px'}}>
                      <div style={{display:'flex',gap:10,alignItems:'center'}}>
                        <div style={{width:34,height:34,borderRadius:'50%',background:'linear-gradient(135deg,#3b82f6,#8b5cf6)',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontSize:12,fontWeight:700,flexShrink:0}}>{l.avatar}</div>
                        <div>
                          <div style={{fontWeight:700,color:'#0f172a',fontSize:14}}>{l.name}</div>
                          {l.certified && <span style={{fontSize:10,color:'#10b981',fontWeight:700}}>✓ CERTIFIED</span>}
                        </div>
                      </div>
                    </td>
                    <td style={{padding:'14px 18px',color:'#64748b',fontSize:13}}>{l.role}</td>
                    {[l.cpr,l.aed,l.heimlich].map((s,si)=>(
                      <td key={si} style={{padding:'14px 18px'}}>
                        <span style={{background:statusBg[s],color:statusTx[s],borderRadius:999,padding:'3px 10px',fontSize:11,fontWeight:600,whiteSpace:'nowrap'}}>{s}</span>
                      </td>
                    ))}
                    <td style={{padding:'14px 18px'}}>
                      <span style={{fontWeight:800,fontSize:15,color:l.avgScore>=80?'#10b981':l.avgScore>=60?'#f59e0b':'#ef4444'}}>{l.avgScore}%</span>
                    </td>
                    <td style={{padding:'14px 18px',color:'#64748b',fontSize:13,textAlign:'center'}}>{l.attempts}</td>
                    <td style={{padding:'14px 18px',color:'#94a3b8',fontSize:12}}>{l.lastActive}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{padding:'14px 22px',borderTop:'1px solid #f8fafc',color:'#94a3b8',fontSize:12,display:'flex',justifyContent:'space-between'}}>
            <span>Showing {filtered.length} of {LEARNERS.length} learners</span>
            <span>St. Mary's · Spring 2025</span>
          </div>
        </div>
      </div>
    </div>
  );
};

/* ─── APP ────────────────────────────────────────────────────────────── */
const App = () => {
  const [screen, setScreen] = useState('landing');
  const [userType, setUserType] = useState('');
  const pages = { landing:<LandingPage setScreen={setScreen}/>, auth:<AuthPage setScreen={setScreen} setUserType={setUserType}/>, dashboard:<LearnerDashboard setScreen={setScreen}/>, module:<ModulePage setScreen={setScreen}/>, upload:<UploadPage setScreen={setScreen}/>, processing:<ProcessingPage setScreen={setScreen}/>, feedback:<FeedbackPage setScreen={setScreen}/>, instructor:<InstructorDashboard setScreen={setScreen}/> };
  return (
    <div>
      <DemoNav screen={screen} setScreen={setScreen}/>
      <Navbar screen={screen} setScreen={setScreen} userType={userType}/>
      <div className="fade-in" key={screen}>
        {pages[screen] || pages.landing}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
